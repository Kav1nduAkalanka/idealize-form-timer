<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idealize Quiz - Gateway</title>
    <style>
        body { margin: 0; font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; background-color: #e5e5f7; background-image: repeating-radial-gradient(circle at 0 0, transparent 0, #e5e5f7 10px), repeating-linear-gradient(#ececf855, #ececf8); overflow: hidden; }
        #timer-bar { background: #1e293b; color: white; padding: 15px; text-align: center; font-size: 1.5rem; font-weight: bold; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: background 0.3s ease; display: none; }
        #timer-bar.warning { background: #ef4444; }
        #form-container { flex-grow: 1; width: 100%; max-width: 850px; margin: 20px auto; background: #ffffff; border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow-y: auto; display: none; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        .status-screen { display: flex; text-align: center; padding: 50px; flex-grow: 1; flex-direction: column; justify-content: center; align-items: center; background-color: rgba(255,255,255,0.9); margin: 20px auto; max-width: 600px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .status-screen h1 { color: #0f172a; font-size: 2.5rem; margin-bottom: 10px; }
        .gateway-input { padding: 12px; font-size: 16px; width: 80%; max-width: 300px; margin: 20px 0; border: 2px solid #cbd5e1; border-radius: 6px; }
        .gateway-btn { padding: 12px 24px; font-size: 16px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .gateway-btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>

    <div id="timer-bar">Time Remaining: <span id="time">--:--</span></div>

    <div id="form-container">
        <iframe id="google-form" src="" title="Assessment Form"></iframe>
    </div>

    <div id="status-display" class="status-screen">
        <h1 id="status-title">Loading...</h1>
        <div id="gateway-ui" style="display: none;">
            <p>Enter the email address you will use for the quiz.</p>
            <input type="email" id="user-email" class="gateway-input" placeholder="participant@example.com" required>
            <br>
            <button class="gateway-btn" onclick="startGateway()">Begin Assessment</button>
        </div>
        <p id="status-message">Checking assessment availability.</p>
    </div>

    <script>
        const CONFIG = {
            formUrl: "https://docs.google.com/forms/d/e/1FAIpQLScp4Ns4E-3u7SGKQI7SDcM544EI6mufcVeb4uM4Qk8fRpE3_g/viewform?usp=header",
            apiUrl: "https://script.google.com/macros/s/AKfycbyZ7uiQWinlffAVqHVDPb6ojZv5jUmYBfQMdPtBytOZd3-PD7tiDNR5PZxSNnYsvV2k/exec", // Paste the Apps Script URL here!
            
            timeLimitMinutes: 30,
            openDate: "2026-06-15T10:00:00",
            closeDate: "2026-06-23T22:00:00"
        };

        let calculatedDuration = 0;

        document.addEventListener("DOMContentLoaded", () => {
            const now = new Date();
            const openTime = new Date(CONFIG.openDate);
            const closeTime = new Date(CONFIG.closeDate);

            if (now < openTime) {
                document.getElementById('status-title').textContent = "Not Yet Open";
                document.getElementById('status-message').innerHTML = `The quiz will open on <strong>${openTime.toLocaleString()}</strong>.`;
            } else if (now >= closeTime) {
                document.getElementById('status-title').textContent = "Quiz Closed";
                document.getElementById('status-message').textContent = "The deadline for the quiz has passed.";
            } else {
                // Window is open! Show the Gateway UI instead of the form directly.
                calculatedDuration = Math.min(CONFIG.timeLimitMinutes * 60, Math.floor((closeTime - now) / 1000));
                
                document.getElementById('status-title').textContent = "Ready to Start";
                document.getElementById('status-message').style.display = 'none';
                document.getElementById('gateway-ui').style.display = 'block';
            }
        });

        // This runs when they click "Begin Assessment"
        function startGateway() {
            const email = document.getElementById('user-email').value.trim();
            if (!email || !email.includes('@')) {
                alert("Please enter a valid email address.");
                return;
            }

            // 1. Hide the Gateway UI immediately
            document.getElementById('status-display').style.display = 'none';
            document.getElementById('form-container').style.display = 'block';
            document.getElementById('timer-bar').style.display = 'block';

            // 2. Secretly ping Apps Script to record the start time
            fetch(CONFIG.apiUrl + "?action=logStart&email=" + encodeURIComponent(email))
                .catch(err => console.log("Silent error logging start:", err));

            // 3. Load the Google Form, automatically pre-filling the email address!
            document.getElementById('google-form').src = CONFIG.formUrl + "?embedded=true&emailAddress=" + encodeURIComponent(email);

            // 4. Start the visual countdown
            runClock(calculatedDuration);
        }

        function runClock(durationInSeconds) {
            let timer = durationInSeconds;
            const timeDisplay = document.getElementById('time');
            const timerBar = document.getElementById('timer-bar');

            const interval = setInterval(() => {
                let minutes = parseInt(timer / 60, 10);
                let seconds = parseInt(timer % 60, 10);
                timeDisplay.textContent = (minutes < 10 ? "0" : "") + minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

                if (timer <= 300) timerBar.classList.add('warning');

                if (--timer < 0) {
                    clearInterval(interval);
                    document.getElementById('form-container').style.display = 'none';
                    timerBar.style.display = 'none';
                    document.getElementById('status-display').style.display = 'flex';
                    document.getElementById('status-title').textContent = "Time's Up!";
                    document.getElementById('gateway-ui').style.display = 'none';
                    document.getElementById('status-message').style.display = 'block';
                    document.getElementById('status-message').textContent = "The assessment window has closed.";
                }
            }, 1000);
        }
    </script>
</body>
</html>
